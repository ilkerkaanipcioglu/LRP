  const { m, d } = parseISO(fromISO);
  if (unit === "M") return d !== 1;
  if (unit === "Q") return !(d === 1 && m === Math.floor((m - 1) / 3) * 3 + 1);
  if (unit === "Y") return !(d === 1 && m === 1);
  return false;
}

/**
 * Build forecast time buckets.
 *   anchorDate   : ISO date string (the "Rapor Tarihi")
 *   grid         : {unit,count} or a mixed-horizon string e.g. 'D3+W2+M1'
 *   intervalType : 'interval' | 'calendar' | undefined (per-unit default)
 * Returns [{key,label,from,to,unit,partial}] (from/to inclusive ISO dates).
 */
function buildBuckets(anchorDate, grid, intervalType) {
  const segs = normalizeGrid(grid);
  const buckets = [];
  let cursor = anchorDate;
  const seen = new Map();
  for (const seg of segs) {
    const type = effectiveIntervalType(seg.unit, intervalType);
    for (let i = 0; i < seg.count; i++) {
      if (buckets.length >= MAX_BUCKETS) return buckets;
      const from = cursor;
      const to = windowEnd(seg.unit, from, type);
      let key = bucketKeyOf(seg.unit, from);
      if (seen.has(key)) { const n = seen.get(key) + 1; seen.set(key, n); key = key + "#" + n; }
      else seen.set(key, 1);
      buckets.push({ key, label: bucketLabelOf(seg.unit, from), from, to, unit: seg.unit, partial: isPartialBucket(seg.unit, from, type) });
      cursor = addDays(to, 1);
    }
  }
  return buckets;
}

/**
 * Resolve which bucket a date falls into. Never silently drops:
 *  - date < anchor   -> overdue handling per `overdueMode`
 *  - date in window  -> that bucket key
 *  - date beyond     -> OVERFLOW_KEY (caller decides: real column or counted drop)
 */
function bucketOf(dateStr, buckets, anchorDate, overdueMode) {
  if (!buckets.length) return null;
  if (cmpISO(dateStr, anchorDate) < 0) {
    if (overdueMode === "separate") return OVERDUE_KEY;
    if (overdueMode === "fold") {
      const first = buckets.find((b) => b.key !== OVERDUE_KEY);
      return first ? first.key : null;
    }
    return null; // 'exclude'
  }
  for (const b of buckets) {
    if (b.key === OVERDUE_KEY) continue;
    if (cmpISO(dateStr, b.from) >= 0 && cmpISO(dateStr, b.to) <= 0) return b.key;
  }
  return OVERFLOW_KEY;
}

// ---- forecast item helpers -------------------------------------------------
function pickForecastDate(it, basis) {
  if (basis === "document") return it.bldat;
  if (basis === "posting") return it.budat;
  return it.netDueDate; // 'due' (default)
}
function sourceEnabled(source, sources) {
  if (!sources) return true;
  if (source === "AR_OPEN") return !!sources.arOpen;
  if (source === "AP_OPEN") return !!sources.apOpen;
  if (source === "CHECK" || source === "NOTE") return !!sources.checkNote;
  if (source === "MEMO") return !!sources.memo;
  if (source === "MM_ORDER") return !!sources.mm;
  if (source === "SD_ORDER") return !!sources.sd;
  return true;
}
// Open-item filter: like applyFilters but reads `investmentApproval` (PRD §7).
function openItemPasses(it, filters) {
  if (!filters) return true;
  if (filters.paid === "paid" && !it.paid) return false;
  if (filters.paid === "unpaid" && it.paid) return false;
  if (filters.materiality && filters.materiality !== "all" && it.materiality !== filters.materiality) return false;
  if (filters.approval && filters.approval !== "all" && it.investmentApproval !== filters.approval) return false;
  return true;
}
function addToCell(cells, cashId, bk, it) {
  if (!cells.has(cashId)) cells.set(cashId, new Map());
  const m = cells.get(cashId);
  let c = m.get(bk);
  if (!c) { c = { lc: 0, gc: 0, itemIds: new Set() }; m.set(bk, c); }
  c.lc += it.amountLC;
  c.gc += it.amountGC;
  c.itemIds.add(it.id);
}
function cellOrZero(cells, id, bk) {
  const m = cells.get(id);
  const v = m && m.get(bk);
  if (!v) return { lc: 0, gc: 0, itemIds: new Set() };
  return { lc: v.lc, gc: v.gc, itemIds: new Set(v.itemIds) }; // fresh copy — no aliasing
}
function combineWithItems(acc, child) {
  const ids = acc.itemIds ? new Set(acc.itemIds) : new Set();
  if (child.itemIds) for (const x of child.itemIds) ids.add(x);
  return { lc: acc.lc + child.lc, gc: acc.gc + child.gc, itemIds: ids };
}

/**
 * Liquidity forecast. params = {
 *   bukrs, anchorDate, grid|horizon, intervalType, dateBasis, view, overdueMode,
 *   overflow, paymentLagDays, sources:{arOpen,apOpen,checkNote,memo,opening,mm,sd},
 *   filters:{paid,materiality,approval}, warningThresholdLC
 * }
 * Returns { buckets, rows, opening, kpis, unmatchedItems, dropped }.
 */
function computeForecast({ cashRows, openItems, openingCash, posted, params }) {
  const idx = indexHierarchy(cashRows);
  const {
    bukrs, anchorDate, dateBasis = "due", view = "balance",
    overdueMode = "separate", overflow = true, paymentLagDays = 0,
    sources, filters, warningThresholdLC = 0,
  } = params;
  const gridSpec = params.horizon || params.grid;

  const realBuckets = buildBuckets(anchorDate, gridSpec, params.intervalType);
  const lastTo = realBuckets.length ? realBuckets[realBuckets.length - 1].to : addDays(anchorDate, -1);

  // filtered item set (bukrs + source toggles + paid/materiality/approval)
  const items = openItems.filter(
    (it) => sourceEnabled(it.source, sources) && it.bukrs === bukrs && ledgerMatches(it, params.ledger) && openItemPasses(it, filters),
  );

  const forecastDate = (it) => {
    const d = pickForecastDate(it, dateBasis);
    return paymentLagDays && it.koart === "D" ? addDays(d, paymentLagDays) : d;
  };

  // decide whether an overflow column is needed
  let needOverflow = false;
  for (const it of items) {
    const d = forecastDate(it);
    if (cmpISO(d, anchorDate) >= 0 && cmpISO(d, lastTo) > 0) { needOverflow = true; break; }
  }
  const overflowOn = overflow && needOverflow;

  // assemble the display bucket list (OVERDUE prepended, SONRASI appended)
  let buckets = realBuckets.slice();
  if (overflowOn) {
    buckets.push({ key: OVERFLOW_KEY, label: "Sonrası", from: addDays(lastTo, 1), to: "9999-12-31", unit: "X", partial: false });
  }
  if (overdueMode === "separate") {
    buckets.unshift({ key: OVERDUE_KEY, label: "Vadesi Geçmiş", from: "0001-01-01", to: addDays(anchorDate, -1), unit: "X", partial: false });
  }

  // assign items to (leaf cashId, bucketKey); accumulate KPIs (portfolio-level,
  // independent of overdue-mode / overflow column decisions).
  const leafList = cashRows.filter((r) => LEAF_TYPES.has(r.dataType) && r.dataType !== "INIBALANCE");
  const cells = new Map();
  const unmatchedItems = [];
  const dropped = [];
  let openArLC = 0, openApLC = 0, openArGC = 0, openApGC = 0, overdueLC = 0, overdueGC = 0;

  for (const it of items) {
    const d = forecastDate(it);
    if (it.source === "AR_OPEN") { openArLC += it.amountLC; openArGC += it.amountGC; }
    if (it.source === "AP_OPEN") { openApLC += it.amountLC; openApGC += it.amountGC; }
    if (cmpISO(d, anchorDate) < 0) { overdueLC += it.amountLC; overdueGC += it.amountGC; }

    const bk = bucketOf(d, buckets, anchorDate, overdueMode);
    if (bk === null) { dropped.push({ id: it.id, reason: overdueMode === "exclude" ? "overdue-excluded" : "out-of-range" }); continue; }
    if (bk === OVERFLOW_KEY && !overflowOn) { dropped.push({ id: it.id, reason: "beyond-horizon" }); continue; }

    const leaf = leafList.find((r) => leafMatches(r, it));
    if (!leaf) { unmatchedItems.push({ ...it, bucketKey: bk }); continue; }
    addToCell(cells, leaf.cashId, bk, it);
  }

  // roll up every bucket independently (parents get summed lc/gc + unioned itemIds)
  const bucketKeys = buckets.map((b) => b.key);
  const rolled = new Map();
  for (const bk of bucketKeys) {
    const m = rollUp(idx, (id) => cellOrZero(cells, id, bk), combineWithItems);
    for (const [id, v] of m) {
      if (!rolled.has(id)) rolled.set(id, new Map());
      rolled.get(id).set(bk, v);
    }
  }

  // opening cash as of anchor (explicit fixture — see PRD opening rule)
  const opening = sources && sources.opening && openingCash && ledgerMatches(openingCash, params.ledger)
    ? { lc: openingCash.lc, gc: openingCash.gc }
    : { lc: 0, gc: 0 };

  // resolve A (opening leaf), G (root), F (root's non-opening child) without hardcoding
  const aId = (cashRows.find((r) => r.dataType === "INIBALANCE") || { cashId: "A" }).cashId;
  const gId = idx.roots.length ? idx.roots[0] : "G";
  const fId = (idx.childrenOf.get(gId) || []).find((c) => c !== aId) || "F";

  placeOpeningAndRunning(rolled, bucketKeys, opening, aId, gId, fId, view, warningThresholdLC);

  const rows = assembleForecastRows(cashRows, idx, rolled, bucketKeys, view, gId);
  const min = minProjected(rolled.get(gId), buckets);
  const kpis = {
    todayCashLC: opening.lc, todayCashGC: opening.gc,
    openArLC, openApLC, openArGC, openApGC, overdueLC, overdueGC,
    minProjectedBalanceLC: min.lc, minProjectedBalanceBucket: min.label,
  };

  return { buckets, rows, opening, kpis, unmatchedItems, dropped };
}

// A goes in the FIRST column only; G is the running closing balance (overrides the
// generic A+F roll-up). 'movement' view: opening=0 and G[i]=F[i] (non-cumulative).
function placeOpeningAndRunning(rolled, bucketKeys, opening, aId, gId, fId, view, threshold) {
  const aRow = rolled.get(aId) || new Map();
  rolled.set(aId, aRow);
  for (const k of bucketKeys) aRow.set(k, { lc: 0, gc: 0, itemIds: new Set() });
  if (view === "balance" && bucketKeys.length) {
    aRow.set(bucketKeys[0], { lc: opening.lc, gc: opening.gc, itemIds: new Set() });
  }

  const fRow = rolled.get(fId) || new Map();
  const gRow = new Map();
  rolled.set(gId, gRow);
  let runLC = view === "balance" ? opening.lc : 0;
  let runGC = view === "balance" ? opening.gc : 0;
  let firstNegDone = false;
  for (const k of bucketKeys) {
    const f = fRow.get(k) || { lc: 0, gc: 0 };
    const cell = { lc: 0, gc: 0, itemIds: new Set() };
    if (view === "balance") {
      runLC += f.lc; runGC += f.gc;
      cell.lc = runLC; cell.gc = runGC;
      if (cell.lc < 0 && !firstNegDone) { cell.firstNegative = true; firstNegDone = true; }
      else if (cell.lc >= 0 && cell.lc < threshold) cell.below = true;
    } else {
      cell.lc = f.lc; cell.gc = f.gc;
    }
    gRow.set(k, cell);
  }
}

function assembleForecastRows(cashRows, idx, rolled, bucketKeys, view, gId) {
  const { depthOf, isLeaf, childrenOf } = idx;
  const sorted = [...cashRows].sort((a, b) => compareCashId(a.cashId, b.cashId));
  return sorted.map((r) => {
    const rmap = rolled.get(r.cashId) || new Map();
    const cells = {};
    let totalLC = 0, totalGC = 0;
    const totalIds = new Set();
    for (const k of bucketKeys) {
      const v = rmap.get(k) || { lc: 0, gc: 0, itemIds: new Set() };
      const ids = v.itemIds ? [...v.itemIds].sort() : [];
      const cell = { lc: v.lc, gc: v.gc, itemIds: ids };
      if (v.below) cell.below = true;
      if (v.firstNegative) cell.firstNegative = true;
      cells[k] = cell;
      totalLC += v.lc; totalGC += v.gc;
      for (const x of ids) totalIds.add(x);
    }
    let total;
    if (r.cashId === gId) {
      // summing running balances is meaningless: show the final closing balance
      // (balance view) or total net movement = Σ F (movement view).
      if (view === "balance") {
        const last = rmap.get(bucketKeys[bucketKeys.length - 1]) || { lc: 0, gc: 0 };
        total = { lc: last.lc, gc: last.gc, itemIds: [] };
      } else {
        total = { lc: totalLC, gc: totalGC, itemIds: [] };
      }
    } else {
      total = { lc: totalLC, gc: totalGC, itemIds: [...totalIds].sort() };
    }
    return {
      cashId: r.cashId,
      parentId: r.parentId,
      description: r.description,
      depth: depthOf(r.cashId),
      isLeaf: isLeaf(r.cashId),
      hasChildren: (childrenOf.get(r.cashId) || []).length > 0,
      isHero: r.cashId === gId,
      cells,
      total,
    };
  });
}

function minProjected(gMap, buckets) {
  if (!gMap) return { lc: 0, label: null };
  let lc = Infinity, label = null;
  for (const b of buckets) {
    const v = gMap.get(b.key);
    if (!v) continue;
    if (v.lc < lc) { lc = v.lc; label = b.label; }
  }
  return lc === Infinity ? { lc: 0, label: null } : { lc, label };
}

// ===========================================================================
//  ÖDEME VE TAHSİLAT PLANI — customer-format operational report. This is not a
//  hierarchy forecast; it returns two ALV-ready flat datasets:
//    1) payment worklist, 2) daily collection + running cash projection.
// ===========================================================================

function roundMoney(n) {
  return Math.round((n || 0) * 100) / 100;
}

function pad2(n) {
  return String(n).padStart(2, "0");
}

function monthStart(year, month) {
  return year + "-" + pad2(month) + "-01";
}

function monthEnd(year, month) {
  return endOfMonth(year, month);
}

function monthDays(year, month) {
  const days = [];
  let cur = monthStart(year, month);
  const end = monthEnd(year, month);
  while (cmpISO(cur, end) <= 0) {
    days.push(cur);
    cur = addDays(cur, 1);
  }
  return days;
}

function rangeDays(fromISO, toISO) {
  const days = [];
  let cur = fromISO;
  while (cmpISO(cur, toISO) <= 0) {
    days.push(cur);
    cur = addDays(cur, 1);
  }
  return days;
}

function inDateRange(iso, fromISO, toISO) {
  return cmpISO(iso, fromISO) >= 0 && cmpISO(iso, toISO) <= 0;
}

function resolvePaymentPlanRange(params) {
  if (params.dateFrom && params.dateTo) return { dateFrom: params.dateFrom, dateTo: params.dateTo };
  if (params.anchorDate) {
    const periodType = params.periodType || "monthly";
    if (periodType === "daily") return { dateFrom: params.anchorDate, dateTo: params.anchorDate };
    if (periodType === "weekly") return { dateFrom: params.anchorDate, dateTo: addDays(params.anchorDate, 6) };
    if (periodType === "monthly") {
      const { y, m } = parseISO(params.anchorDate);
      return { dateFrom: monthStart(y, m), dateTo: monthEnd(y, m) };
    }
  }
  return { dateFrom: monthStart(params.year, params.month), dateTo: monthEnd(params.year, params.month) };
}

function paymentPlanPasses(p, filters) {
  if (!filters) return true;
  if (filters.materiality && filters.materiality !== "all" && p.materiality !== filters.materiality) return false;
  const method = p.paymentMethod || p.collectionMethod;
  if (filters.paymentMethod && filters.paymentMethod !== "all" && method !== filters.paymentMethod) return false;
  return true;
}

function statusCodeFor(item, date, actualDate) {
  if (item.status === "actual" || item.status === "expected") return item.status;
  return actualDate && cmpISO(date, actualDate) <= 0 ? "actual" : "expected";
}

function statusLabel(code) {
  return code === "actual" ? "Gerçekleşen" : "Beklenen";
}

function statusPasses(code, filters) {
  return !filters || !filters.flowStatus || filters.flowStatus === "all" || filters.flowStatus === code;
}

function rateFor(date, collections) {
  const dated = collections
    .filter((c) => c.usdRate && c.eurRate)
    .sort((a, b) => cmpISO(a.date, b.date));
  if (!dated.length) return { usdRate: 1, eurRate: 1 };
  let candidate = dated[0];
  for (const c of dated) {
    if (cmpISO(c.date, date) <= 0) candidate = c;
    else break;
  }
  return { usdRate: candidate.usdRate, eurRate: candidate.eurRate };
}

function paymentAmountLC(payment, rates) {
  return roundMoney(
    (payment.amountTRY || 0) +
      (payment.amountUSD || 0) * rates.usdRate +
      (payment.amountEUR || 0) * rates.eurRate,
  );
}

function addCustomerToDaily(target, item) {
  if (item.collectionMethod === "ÇEK") target.checkLC = roundMoney(target.checkLC + item.amountLC);
  else if (item.collectionMethod === "Gelen Havale") target.incomingTransferLC = roundMoney(target.incomingTransferLC + item.amountLC);
  else if (item.collectionMethod === "POS") target.posLC = roundMoney(target.posLC + item.amountLC);
  else if (item.collectionMethod === "Nakit") target.cashLC = roundMoney(target.cashLC + item.amountLC);
}

function collectionAmountLC(c) {
  return roundMoney((c.checkLC || 0) + (c.incomingTransferLC || 0) + (c.posLC || 0) + (c.cashLC || 0));
}

function paymentPlanBaseOpeningLC({ payments, customerItems, collections, openingCash, bukrs, ledger, dateFrom }) {
  const base = openingCash && openingCash.bukrs === bukrs && ledgerMatches(openingCash, ledger)
    ? openingCash.lc || 0
    : 0;
  const priorPayments = payments
    .filter((p) => p.bukrs === bukrs && ledgerMatches(p, ledger) && cmpISO(p.paymentDate, dateFrom) < 0)
    .reduce((sum, p) => roundMoney(sum + paymentAmountLC(p, rateFor(p.paymentDate, collections))), 0);
  const priorCustomerItems = customerItems
    .filter((c) => c.bukrs === bukrs && ledgerMatches(c, ledger) && cmpISO(c.collectionDate, dateFrom) < 0)
    .reduce((sum, c) => roundMoney(sum + paymentAmountLC(c, rateFor(c.collectionDate, collections))), 0);
  const priorCollections = collections
    .filter((c) => c.bukrs === bukrs && ledgerMatches(c, ledger) && cmpISO(c.date, dateFrom) < 0)
    .reduce((sum, c) => roundMoney(sum + collectionAmountLC(c)), 0);
  return roundMoney(base + priorCustomerItems + priorCollections - priorPayments);
}

function computePaymentCollectionPlan({ payments, customerItems = [], collections, openingCash, params }) {
  const { bukrs, ledger = "0L", filters } = params;
  const { dateFrom, dateTo } = resolvePaymentPlanRange(params);
  const actualDate = params.actualDate || dateFrom;
  const partyScope = (filters && filters.partyScope) || "both";
  const includeVendors = partyScope !== "customers";
  const includeCustomers = partyScope !== "vendors";
  const companyCollections = collections.filter((c) => c.bukrs === bukrs && ledgerMatches(c, ledger));
  const scopedCollections = companyCollections.filter((c) => inDateRange(c.date, dateFrom, dateTo));
  const collectionByDate = new Map(scopedCollections.map((c) => [c.date, c]));

  const paymentRows = payments
    .filter(
      (p) => {
        const code = statusCodeFor(p, p.paymentDate, actualDate);
        return (
          p.bukrs === bukrs &&
          ledgerMatches(p, ledger) &&
          inDateRange(p.paymentDate, dateFrom, dateTo) &&
          paymentPlanPasses(p, filters) &&
          statusPasses(code, filters)
        );
      },
    )
    .sort((a, b) => cmpISO(a.paymentDate, b.paymentDate) || a.partner.localeCompare(b.partner, "tr"))
    .map((p, index) => {
      const rates = rateFor(p.paymentDate, companyCollections);
      const amountLC = paymentAmountLC(p, rates);
      const code = statusCodeFor(p, p.paymentDate, actualDate);
      return {
        cashId: String(index + 1).padStart(3, "0"),
        parentId: null,
        depth: 0,
        hasChildren: false,
        isLeaf: true,
        ...p,
        usdRate: rates.usdRate,
        eurRate: rates.eurRate,
        statusCode: code,
        statusLabel: statusLabel(code),
        amountLC,
      };
    });

  const vendorRows = includeVendors ? paymentRows : [];

  const customerRows = includeCustomers
    ? customerItems
        .filter(
          (c) => {
            const code = statusCodeFor(c, c.collectionDate, actualDate);
            return (
              c.bukrs === bukrs &&
              ledgerMatches(c, ledger) &&
              inDateRange(c.collectionDate, dateFrom, dateTo) &&
              paymentPlanPasses(c, filters) &&
              statusPasses(code, filters)
            );
          },
        )
        .sort((a, b) => cmpISO(a.collectionDate, b.collectionDate) || a.partner.localeCompare(b.partner, "tr"))
        .map((c, index) => {
          const rates = rateFor(c.collectionDate, companyCollections);
          const amountLC = paymentAmountLC(c, rates);
          const code = statusCodeFor(c, c.collectionDate, actualDate);
          return {
            cashId: String(index + 1).padStart(3, "0"),
            parentId: null,
            depth: 0,
            hasChildren: false,
            isLeaf: true,
            ...c,
            usdRate: rates.usdRate,
            eurRate: rates.eurRate,
            statusCode: code,
            statusLabel: statusLabel(code),
            amountLC,
          };
        })
    : [];

  const paymentTotalsByDate = new Map();
  const paymentIdsByDate = new Map();
  for (const p of vendorRows) {
    paymentTotalsByDate.set(p.paymentDate, roundMoney((paymentTotalsByDate.get(p.paymentDate) || 0) + p.amountLC));
    if (!paymentIdsByDate.has(p.paymentDate)) paymentIdsByDate.set(p.paymentDate, []);
    paymentIdsByDate.get(p.paymentDate).push(p.id);
  }

  const customerTotalsByDate = new Map();
  const customerIdsByDate = new Map();
  for (const c of customerRows) {
    if (!customerTotalsByDate.has(c.collectionDate)) {
      customerTotalsByDate.set(c.collectionDate, { checkLC: 0, incomingTransferLC: 0, posLC: 0, cashLC: 0 });
    }
    addCustomerToDaily(customerTotalsByDate.get(c.collectionDate), c);
    if (!customerIdsByDate.has(c.collectionDate)) customerIdsByDate.set(c.collectionDate, []);
    customerIdsByDate.get(c.collectionDate).push(c.id);
  }

  const opening = {
    lc: paymentPlanBaseOpeningLC({ payments, customerItems, collections: companyCollections, openingCash, bukrs, ledger, dateFrom }),
    gc: openingCash && openingCash.bukrs === bukrs && ledgerMatches(openingCash, ledger) ? openingCash.gc || 0 : 0,
  };

  let running = opening.lc;
  const dailyRows = [];
  for (const date of rangeDays(dateFrom, dateTo)) {
    const c = collectionByDate.get(date) || {};
    const customer = customerTotalsByDate.get(date) || { checkLC: 0, incomingTransferLC: 0, posLC: 0, cashLC: 0 };
    const rates = rateFor(date, companyCollections);
    const paymentLC = roundMoney(paymentTotalsByDate.get(date) || 0);
    const checkLC = roundMoney((c.checkLC || 0) + customer.checkLC);
    const incomingTransferLC = roundMoney((c.incomingTransferLC || 0) + customer.incomingTransferLC);
    const posLC = roundMoney((c.posLC || 0) + customer.posLC);
    const cashLC = roundMoney((c.cashLC || 0) + customer.cashLC);
    const receiptLC = roundMoney(checkLC + incomingTransferLC + posLC + cashLC);
    const dailyNetLC = roundMoney(receiptLC - paymentLC);
    running = roundMoney(running + dailyNetLC);
    dailyRows.push({
      cashId: date.slice(8, 10),
      parentId: null,
      depth: 0,
      hasChildren: false,
      isLeaf: true,
      date,
      usdRate: c.usdRate || rates.usdRate,
      eurRate: c.eurRate || rates.eurRate,
      paymentLC,
      checkLC,
      incomingTransferLC,
      posLC,
      cashLC,
      receiptLC,
      dailyNetLC,
      balanceLC: running,
      paymentIds: paymentIdsByDate.get(date) || [],
      customerIds: customerIdsByDate.get(date) || [],
      note: c.note || "",
    });
  }

  const totalPaymentLC = roundMoney(dailyRows.reduce((sum, r) => sum + r.paymentLC, 0));
  const totalReceiptLC = roundMoney(dailyRows.reduce((sum, r) => sum + r.receiptLC, 0));
  const minRow = dailyRows.reduce((min, r) => (r.balanceLC < min.balanceLC ? r : min), dailyRows[0]);

  const rowF = fc.rows.find((r) => r.cashId === "F");

  if (!rowF) return totals;
  for (const cell of Object.values(rowF.cells || {})) {
    for (const id of cell.itemIds || []) {
      if (seen.has(id)) continue;
      seen.add(id);
      const item = sourceById.get(id);
      if (!item) continue;
      totals[sourceTypeOf(item)] += item.amountLC;

  if (types.has("manual")) return "fc-manual-source";

  return "";
}

const SOURCE_TR = {
  AR_OPEN: "Müşteri Faturası",
  AP_OPEN: "Tedarikçi Faturası",
  CHECK: "Çek",
  NOTE: "Senet",
  MEMO: "Memo / Manuel Tahmin",
  MM_ORDER: "MM Satınalma Siparişi",
  SD_ORDER: "SD Satış Siparişi",
};

// Open-item (forecast) document display — like openDoc but the item has NOT yet
// settled to a bank/cash account, so there is no bank line. Read-only.
function openOpenItemDoc(App, item) {
  const isOrder = item.source === "MM_ORDER" || item.source === "SD_ORDER";
  const amt = Math.abs(item.amountLC);
  const inflow = item.amountLC > 0;
  const partyAcct = item.racct || (inflow ? "1200000000" : "3200000000");
  const offsetAcct = inflow ? "6000000000" : "7700000000";
  const partyName = item.partner ? item.partner.name : "";

  // Entry-view items: customer/vendor open line + revenue/expense offset (credits trailing minus).
  const items = inflow
    ? [
        { pos: 1, ka: "01", acct: partyAcct, text: partyName + " (müşteri)", debit: true },
        { pos: 2, ka: "50", acct: offsetAcct, text: "Gelir / hasılat", debit: false },
      ]
    : [
        { pos: 1, ka: "31", acct: partyAcct, text: partyName + " (tedarikçi)", debit: false },
        { pos: 2, ka: "40", acct: offsetAcct, text: "Gider", debit: true },

  const toolbar = el(
    "div",
    { class: "fb-toolbar" },
    toolButton({ iconName: "detail", tooltip: "Görüntüle/Değiştir" }),
    toolButton({ iconName: "find", tooltip: "Diğer belge" }),
    toolButton({ iconName: "print", tooltip: "Yazdır" }),
    el("span", { class: "sep" }),
    toolButton({ iconName: "variant", label: "Görüntü para birimi", tooltip: "Görüntü para birimi" }),
    toolButton({ iconName: "table", label: "Defteri kebir görünümü", tooltip: "Defteri kebir görünümü" }),
  );

  const fld = (lbl, val) =>
    el("div", { class: "fb-field" }, el("span", { class: "fb-lbl" }, lbl), el("span", { class: "fb-val" }, val ?? ""));
  const blank = () => el("div", { class: "fb-field" });

  const header = el(
    "div",
    { class: "fb-header" },
    fld("Belge numarası", item.belnr),
    fld("Şirket kodu", item.bukrs),
    fld("Mali yıl", String(item.gjahr)),
    fld("Belge tarihi", dateTR(item.bldat)),
    fld("Kayıt tarihi", dateTR(item.budat)),
    fld("Vade tarihi", dateTR(item.netDueDate)),
    fld("Kaynak", SOURCE_TR[item.source] || item.source),
    fld("Kaynak türü", item.source === "MEMO" || item.manualForecast ? "Manuel Tahmin" : "Belgeye Dayalı"),
    fld("Müşteri / Tedarikçi", partyName),
    fld("Ödeme koşulu", item.paymentTerms),
    fld("Para birimi", item.belgePB || item.rhcur),
  );

  const gridTb = el(
    "div",
    { class: "fb-toolbar grid" },
    icon("find"),
    icon("print"),
    icon("filter"),
    icon("sortAsc"),
    icon("sum"),
    icon("detail"),
  );

  const th = (t, cls) => el("th", cls ? { class: cls } : {}, t);
  const rows = items.map((it, i) =>
    el(
      "tr",
      { class: i === 0 ? "sel" : "" },
      el("td", {}, item.bukrs),
      el("td", {}, ""),
      el("td", { class: "r" }, String(it.pos)),
      el("td", { class: "r" }, it.ka),
      el("td", {}, ""),
      el("td", {}, it.acct),
      el("td", {}, it.acct),
      el("td", {}, it.text),
      el("td", { class: "r" }, fmtAmount(amt) + (it.debit ? "" : "-")),
      el("td", {}, item.belgePB || item.rhcur),
      el("td", {}, ""),
    ),
  );

  const grid = el(
    "table",
    { class: "doc-table fb-grid" },
    el(
      "thead",
      {},
      el("tr", {}, th("ŞK"), th("İA"), th("Klm", "r"), th("KA", "r"), th("Ö"), th("Hesap"), th("Ana hesap"), th("Tanım"), th("Tutar", "r"), th("PB"), th("Vr")),
    ),
    el("tbody", {}, ...rows),
  );

  const body = el(
    "div",
    { style: { minWidth: "720px" } },
    toolbar,
    el("div", { class: "dlg-note" }, isOrder ? "Bu sipariş henüz banka/kasa hesabına yansımamıştır (tahmini nakit akışı)." : "Bu açık kalem henüz banka/kasa hesabına yansımamıştır (tahmini nakit akışı)."),
    el("div", { class: "fb-group" }, el("div", { class: "fb-group-title" }, isOrder ? "Sipariş görünümü" : "Giriş görünümü"), header),
    el("div", { class: "fb-grid-wrap" }, gridTb, el("div", { style: { overflow: "auto" } }, grid)),
  );

    title: isOrder ? "Sipariş görüntüsü" : "Açık Kalem görüntüsü: Giriş görünümü  (FB03)",
    bodyNode: body,
    width: 820,
    footerNodes: [pushButton("Kapat", () => dlg.close())],
